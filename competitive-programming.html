<!DOCTYPE html>
<html>
<head>
  <style>
    #the-svg {
      width: 100%;
      height: 100%;
      position: absolute;
      opacity: 0.8;
      display: none;
    }

    #show-svg:checked ~ div > #the-svg {
      display: block;
    }
  </style>
</head>
<body>
  <input type="checkbox" id="show-svg" checked/>

  <div style="width: 460px; height: 460px; border: 1px solid black; position: relative">
    <img src="_files/competitive-programming.png" style="width: 100%; height: 100%; position: absolute; opacity: 0.3; pointer-events: none;" />
    <embed id="the-svg" src="_files/competitive-programming.svg" style=""/>
  </div>
</body>
</html>
