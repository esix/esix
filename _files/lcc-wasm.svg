<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vig" cx="50%" cy="52%" r="62%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.82"/>
      <stop offset="55%" stop-color="#000" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0a0a0a"/>

  <!-- background: start of a hello-world C program, clipped by the viewBox -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="13" fill="#787878">
    <text x="6" y="22">#include &lt;stdio.h&gt;</text>
    <text x="6" y="40">#include &lt;wasm.h&gt;</text>
    <text x="6" y="64">int main(void) {</text>
    <text x="6" y="82">    printf("hello,</text>
    <text x="6" y="100">        world\n");</text>
    <text x="6" y="118">    return 0;</text>
    <text x="6" y="136">}</text>
    <text x="6" y="160">/* compiles</text>
    <text x="6" y="178">   itself */</text>
  </g>

  <!-- darken centre so the foreground pops -->
  <rect width="200" height="200" fill="url(#vig)"/>

  <!-- foreground -->
  <g text-anchor="middle" font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-weight="bold" filter="url(#sh)">
    <text x="100" y="108" font-size="66" fill="#ff8c1a" letter-spacing="2">LCC</text>
    <text x="100" y="146" font-size="34" fill="#4fc3f7" letter-spacing="4">wasm</text>
  </g>
</svg>
