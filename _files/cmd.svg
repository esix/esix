<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style type="text/css"><![CDATA[
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    .cursor { animation: blink 1.1s steps(1) infinite; }
  ]]></style>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#33ff33" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0a0a0a"/>

  <!-- title -->
  <text x="100" y="82" text-anchor="middle"
        font-family="'Consolas','Courier New',monospace" font-weight="bold"
        font-size="64" fill="#33ff33" filter="url(#glow)">cmd</text>

  <!-- DOS prompt with a blinking cursor -->
  <text x="20" y="138" text-anchor="start"
        font-family="'Consolas','Courier New',monospace" font-weight="bold"
        font-size="30" fill="#f2f2f2"><tspan>C:\&gt;</tspan><tspan class="cursor" dx="2" dy="5">_</tspan></text>
</svg>
